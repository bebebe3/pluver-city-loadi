<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GMod Loading Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* ФОН И ПЕРЕХОДЫ КАРТИНОК */
        #background-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        .bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 2s ease-in-out; /* Плавность переходов */
        }
        .bg-image.active { opacity: 1; }

        /* ЗАТЕМНЕНИЕ ДЛЯ ЧИТАЕМОСТИ ТЕКСТА */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 100%);
            z-index: 2;
        }

        /* ГЛАВНЫЙ КОНТЕНТ */
        #content {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3; display: flex; flex-direction: column; justify-content: center;
            padding-left: 5%; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        /* НАЗВАНИЕ СЕРВЕРА */
        h1 { font-size: 5rem; font-weight: 900; margin: 0; text-transform: uppercase; color: #ff3366; }
        h2 { font-size: 2rem; font-weight: 400; margin: 10px 0 30px 0; color: #fff; }

        /* ИНФОБЛОК */
        .info-box {
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px);
            padding: 20px; border-left: 5px solid #ff3366; border-radius: 5px;
            width: 400px; font-size: 1.1rem; line-height: 1.6;
        }

        /* ПРОГРЕСС-БАР ЗАГРУЗКИ */
        #loading-container {
            position: absolute; bottom: 50px; left: 5%; width: 90%; z-index: 4;
        }
        #status-text { font-weight: 700; margin-bottom: 10px; color: white; text-shadow: 1px 1px 2px black;}
        #progress-bar {
            width: 100%; height: 15px; background: rgba(255,255,255,0.2);
            border-radius: 10px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #progress-fill {
            width: 0%; height: 100%; background: #ff3366;
            transition: width 0.2s ease;
        }
    </style>
</head>
<body>

    <!-- МУЗЫКА НА ФОНЕ. Файл music.mp3 должен лежать на гитхабе рядом с этим кодом -->
    <audio id="bg-music" src="song.mp3" autoplay loop></audio>

    <!-- КОНТЕЙНЕР ДЛЯ КАРТИНОК -->
    <div id="background-container"></div>
    <div id="overlay"></div>

    <!-- ТЕКСТ НА ЭКРАНЕ -->
    <div id="content">
        <h1>СУПЕР СЕРВЕР</h1>
        <h2>Добро пожаловать!</h2>
        
        <div class="info-box">
            • Адекватная администрация<br>
            • Уникальные аддоны<br>
            • Крутые ивенты каждые выходные<br>
            • Заходи в наш Discord!
        </div>
    </div>

    <!-- ПОЛОСА ЗАГРУЗКИ -->
    <div id="loading-container">
        <div id="status-text">Загрузка файлов...</div>
        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>

    <script>
        /* ==========================================
           НАСТРОЙКА КАРТИНОК. 
           Файлы 1.jpg, 2.jpg, 3.jpg грузи на гитхаб
           ========================================== */
        const images = [
            "kittie.png", 
            "two2.png", 
            "three3.png"  
        ];

        /* ЛОГИКА СМЕНЫ КАРТИНОК КАК В МЕНЮ GMOD */
        const bgContainer = document.getElementById('background-container');
        let currentIndex = 0;

        images.forEach((imgSrc, index) => {
            const div = document.createElement('div');
            div.className = 'bg-image';
            if (index === 0) div.classList.add('active');
            div.style.backgroundImage = `url('${imgSrc}')`;
            bgContainer.appendChild(div);
        });

        const bgDivs = document.querySelectorAll('.bg-image');

        setInterval(() => {
            bgDivs[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % images.length;
            bgDivs[currentIndex].classList.add('active');
        }, 5000); // 5000 = 5 секунд на одну картинку

        /* ГРОМКОСТЬ МУЗЫКИ (0.3 = 30%) */
        let music = document.getElementById('bg-music');
        music.volume = 0.3; 

        /* ==========================================
           КОД ЗАГРУЗКИ ДЛЯ ГАРРИС МОДА
           ========================================== */
        let filesTotal = 0;
        let filesNeeded = 0;

        function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, lang ) {
            // Если хочешь чтобы имя сервера бралось само, убери "//" в начале следующей строки:
            // document.querySelector('h1').innerText = servername;
        }

        function SetFilesTotal( total ) { filesTotal = total; }
        
        function SetFilesNeeded( needed ) {
            filesNeeded = needed;
            UpdateProgress();
        }

        function DownloadingFile( fileName ) {
            document.getElementById('status-text').innerText = "Скачивание: " + fileName;
        }

        function SetStatusChanged( status ) {
            document.getElementById('status-text').innerText = status;
        }

        function UpdateProgress() {
            if(filesTotal > 0) {
                let downloaded = filesTotal - filesNeeded;
                let percentage = (downloaded / filesTotal) * 100;
                document.getElementById('progress-fill').style.width = percentage + '%';
            }
        }
    </script>
</body>
</html>
